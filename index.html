<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>A Hug For You 💛</title>
<meta name="description" content="A little piece of love, wherever you are.">

<!-- PWA: manifest -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a0a10">

<!-- PWA: iOS home-screen support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="A Hug For You">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<!-- Icons -->
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--w1:#ffb347;--w2:#ff8c69;--gold:#ffd580;--cream:#fff8f0;--deep:#1a0a10}

html,body{
  width:100%;height:100%;
  background:var(--deep);
  font-family:'Lato',sans-serif;
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
}

canvas#bg{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}

/* scene */
.scene{
  position:relative;z-index:1;
  min-height:100svh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px 16px;gap:0;
}

.miss-text{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;
  font-size:clamp(.9rem,3.2vw,1.2rem);color:var(--gold);
  letter-spacing:.2em;text-transform:uppercase;
  animation:fadeUp 1s ease .1s both;margin-bottom:10px;
}
.headline{
  font-family:'Cormorant Garamond',serif;font-weight:300;
  font-size:clamp(2.4rem,9vw,5rem);color:var(--cream);
  line-height:1.05;text-align:center;
  animation:fadeUp 1s ease .3s both;margin-bottom:6px;
}
.headline em{font-style:italic;color:var(--w1)}
.sub{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(.95rem,2.8vw,1.1rem);color:rgba(255,245,230,.5);
  animation:fadeUp 1s ease .5s both;
  margin-bottom:clamp(28px,6vw,50px);
}

/* hug area — NO opacity animation so iOS Chrome can always hit-test it */
.hug-wrap{
  position:relative;
  width:clamp(160px,42vw,230px);
  height:clamp(160px,42vw,230px);
  margin-bottom:clamp(22px,5vw,40px);
  flex-shrink:0;
  /* rings drawn on canvas behind, never block taps */
}

canvas.rings-cv{
  position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;z-index:0;border-radius:50%;
}

/* THE BUTTON — no z-index stacking issues, nothing on top */
#hugBtn{
  /* reset all button defaults */
  -webkit-appearance:none;appearance:none;
  border:none;outline:none;margin:0;padding:0;
  background:none;

  /* position */
  position:absolute;
  top:12%;left:12%;right:12%;bottom:12%;
  border-radius:50%;
  z-index:1;

  /* visual */
  background:radial-gradient(circle at 38% 36%,#ff9a5c,#e8456a 58%,#b5205a);
  box-shadow:0 0 38px rgba(232,69,106,.5),0 0 70px rgba(255,179,71,.15),
             inset 0 1px 2px rgba(255,255,255,.25);

  /* tap */
  cursor:pointer;
  touch-action:manipulation;
  -webkit-touch-callout:none;
  -webkit-user-select:none;
  user-select:none;

  /* layout */
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:5px;
  overflow:hidden;

  transition:transform .12s ease,box-shadow .12s ease;
}
#hugBtn::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:linear-gradient(140deg,rgba(255,255,255,.22) 0%,transparent 50%);
  pointer-events:none;
}
#hugBtn:active,#hugBtn.pressed{
  transform:scale(.91);
  box-shadow:0 0 18px rgba(232,69,106,.7),0 0 40px rgba(255,179,71,.2),
             inset 0 1px 1px rgba(255,255,255,.1);
}
.hug-icon{
  font-size:clamp(2rem,7.5vw,2.8rem);line-height:1;
  pointer-events:none;display:block;
  transition:transform .18s ease;
}
#hugBtn.pressed .hug-icon{transform:scale(1.18) rotate(-8deg)}
.hug-label{
  font-family:'Lato',sans-serif;font-weight:300;
  font-size:clamp(.62rem,1.8vw,.78rem);letter-spacing:.28em;
  text-transform:uppercase;color:rgba(255,245,230,.88);
  pointer-events:none;display:block;
}

/* card */
.msg-card{
  max-width:min(88vw,400px);
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,179,71,.16);border-radius:16px;
  padding:clamp(14px,4vw,24px) clamp(18px,5vw,32px);
  text-align:center;
  animation:fadeUp 1s ease .8s both;
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
  margin-bottom:16px;
}
.msg-card p{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(1rem,3vw,1.2rem);color:rgba(255,245,230,.75);line-height:1.8;
}
.msg-card p strong{color:var(--w1);font-style:normal;font-weight:400}

/* counter */
.counter-wrap{
  display:flex;align-items:center;gap:10px;
  animation:fadeUp 1s ease 1s both;
}
.counter-label{
  font-family:'Lato',sans-serif;font-weight:300;
  font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;
  color:rgba(255,245,230,.32);
}
.counter-val{
  font-family:'Cormorant Garamond',serif;
  font-size:1.35rem;color:var(--gold);
  transition:transform .15s ease,color .15s ease;
  min-width:1.8ch;text-align:center;
}
.counter-val.bump{transform:scale(1.5);color:var(--w2)}

/* hearts */
#hearts-layer{position:fixed;inset:0;pointer-events:none;z-index:10;overflow:hidden}
.fheart{
  position:absolute;bottom:-60px;
  animation:floatUp linear forwards;
}
@keyframes floatUp{
  0%  {transform:translateY(0) rotate(var(--r0)) scale(1);opacity:1}
  80% {opacity:.85}
  100%{transform:translateY(-115vh) rotate(var(--r1)) scale(.45);opacity:0}
}

/* burst */
#burst-layer{
  position:fixed;inset:0;pointer-events:none;z-index:20;
  display:flex;align-items:center;justify-content:center;
}
.burst-text{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(2.2rem,11vw,5.5rem);color:var(--gold);
  text-shadow:0 0 36px rgba(255,213,128,.55);
  opacity:0;transform:scale(.5);pointer-events:none;text-align:center;padding:0 20px;
}
.burst-text.show{animation:burstAnim 1.15s cubic-bezier(.22,1,.36,1) forwards}
@keyframes burstAnim{
  0%  {opacity:0;transform:scale(.38) rotate(-5deg)}
  38% {opacity:1;transform:scale(1.06) rotate(2deg)}
  68% {opacity:1;transform:scale(.97)}
  100%{opacity:0;transform:scale(1.12) rotate(-1deg)}
}

/* ambient */
.ambient{position:fixed;pointer-events:none;z-index:0;opacity:0;animation:ambFloat linear infinite}
@keyframes ambFloat{
  0%  {transform:translateY(0) rotate(0deg);opacity:0}
  8%  {opacity:.16}
  92% {opacity:.1}
  100%{transform:translateY(-100vh) rotate(22deg);opacity:0}
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to  {opacity:1;transform:translateY(0)}
}
@media(max-height:600px){.msg-card{display:none}}
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div id="hearts-layer"></div>
<div id="burst-layer"><div class="burst-text" id="burstTxt">💛 Sending love!</div></div>

<div class="scene">
  <p class="miss-text">✦ Thinking of you ✦</p>
  <h1 class="headline">I <em>miss</em> you<br>so much.</h1>
  <p class="sub">Across every distance, always.</p>

  <div class="hug-wrap">
    <canvas class="rings-cv" id="ringsCv"></canvas>
    <button id="hugBtn" type="button" aria-label="Send a hug">
      <span class="hug-icon">🤗</span>
      <span class="hug-label">Tap to hug</span>
    </button>
  </div>

  <div class="msg-card">
    <p>No matter where you are, I carry <strong>you</strong> with me.<br>
    Every quiet moment, every smile —<br>they all remind me of <strong>us</strong>.</p>
  </div>

  <div class="counter-wrap">
    <span class="counter-label">Hugs sent</span>
    <span class="counter-val" id="cntVal">0</span>
    <span class="counter-label">💛</span>
  </div>
</div>

<script>
/* ── Background ── */
const bgC = document.getElementById('bg');
const bgX = bgC.getContext('2d');
let W,H,pts=[];

function resize(){W=bgC.width=innerWidth;H=bgC.height=innerHeight}
resize();
window.addEventListener('resize',()=>{resize();mkPts()});

function mkPts(){
  pts=[];
  const n=Math.min(Math.floor(W*H/8000),120);
  for(let i=0;i<n;i++) pts.push({
    x:Math.random()*W,y:Math.random()*H,
    r:Math.random()*1.4+.3,a:Math.random()*Math.PI*2,
    s:Math.random()*.28+.05,o:Math.random()*.45+.08
  });
}
mkPts();

(function loop(){
  const g=bgX.createRadialGradient(W*.5,H*.55,0,W*.5,H*.55,W*.8);
  g.addColorStop(0,'#2e0a1a');g.addColorStop(.5,'#1a0a10');g.addColorStop(1,'#0c060a');
  bgX.fillStyle=g;bgX.fillRect(0,0,W,H);
  const gw=bgX.createRadialGradient(W*.5,H*.45,0,W*.5,H*.45,W*.33);
  gw.addColorStop(0,'rgba(232,69,106,0.11)');gw.addColorStop(1,'transparent');
  bgX.fillStyle=gw;bgX.fillRect(0,0,W,H);
  pts.forEach(p=>{
    p.y-=p.s;p.x+=Math.sin(p.a)*.16;p.a+=.007;
    if(p.y<-4){p.y=H+4;p.x=Math.random()*W}
    bgX.beginPath();bgX.arc(p.x,p.y,p.r,0,Math.PI*2);
    bgX.fillStyle=`rgba(255,213,128,${p.o})`;bgX.fill();
  });
  requestAnimationFrame(loop);
})();

/* ── Rings on canvas (pointer-events:none) ── */
const rC=document.getElementById('ringsCv');
const rX=rC.getContext('2d');
let rt=0;
(function rLoop(){
  const sz=rC.offsetWidth||200;
  const dpr=window.devicePixelRatio||1;
  rC.width=rC.height=sz*dpr;
  rX.scale(dpr,dpr);
  rX.clearRect(0,0,sz,sz);
  const cx=sz/2,cy=sz/2,base=sz/2;
  [0,.93,1.86].forEach(off=>{
    const t=((rt/1000+off)%2.8)/2.8;
    const r=base*(1+t*.78);
    rX.beginPath();rX.arc(cx,cy,r,0,Math.PI*2);
    rX.strokeStyle=`rgba(255,179,71,${(1-t)*.5})`;
    rX.lineWidth=1.5;rX.stroke();
  });
  rt+=16;
  requestAnimationFrame(rLoop);
})();

/* ── Hug ── */
/* ⚙️ EDIT THIS: your WhatsApp number, country code + number, NO + sign, NO spaces.
   Example: Mauritius number 5xxx xxxx -> "23057xxxxxxx" */
const WHATSAPP_NUMBER = "23057015550"; // e.g. "23057123456"

const btn     = document.getElementById('hugBtn');
const cntEl   = document.getElementById('cntVal');
const burstEl = document.getElementById('burstTxt');
const hl      = document.getElementById('hearts-layer');
const msgs    = ['💛 Sending love!','🤗 Big hug!','💫 Feeling you close~','✨ Forever missing you','💕 Hold me tight'];
let count=0, busy=false;

function doHug(){
  if(busy)return;
  busy=true;
  setTimeout(()=>{busy=false},350);

  count++;
  cntEl.textContent=count;
  cntEl.classList.remove('bump');
  void cntEl.offsetWidth;
  cntEl.classList.add('bump');
  setTimeout(()=>cntEl.classList.remove('bump'),320);

  btn.classList.add('pressed');
  setTimeout(()=>btn.classList.remove('pressed'),200);

  const isMilestone = count % 5 === 0;
  burstEl.textContent = isMilestone
    ? '💌 Sending this one to them...'
    : msgs[Math.floor(Math.random()*msgs.length)];
  burstEl.classList.remove('show');
  void burstEl.offsetWidth;
  burstEl.classList.add('show');

  hearts(isMilestone ? 20 : 10);

  /* Every 5th hug: open WhatsApp with a pre-written message, 1 tap to send */
  if (isMilestone) {
    setTimeout(() => openWhatsAppHug(count), 900); // small delay so she sees the burst first
  }
}

const waMessages = [
  "I just sent you a hug 🤗💛 (sent from our little app)",
  "Sending you 5 more hugs your way 💕 missing you!",
  "Just thinking of you and had to send a hug 🤗✨",
  "Another hug for you 💛 can't wait to see you",
  "Sent you some love just now 🫶 miss you so much"
];

function openWhatsAppHug(totalCount) {
  if (!WHATSAPP_NUMBER || WHATSAPP_NUMBER === "23057015550") return; // safety: do nothing until configured
  const msg = waMessages[Math.floor(Math.random() * waMessages.length)]
    + ` (${totalCount} hugs sent so far!)`;
  const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}

/* Attach ONLY onclick — cleanest possible for all iOS/Android browsers */
btn.onclick = doHug;

function hearts(n){
  const pool=['💛','❤️','🧡','💖','✨','💕','💗','🌸','💞','🫶'];
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const e=document.createElement('span');
      const d=2.6+Math.random()*2.2;
      e.className='fheart';
      e.textContent=pool[Math.floor(Math.random()*pool.length)];
      e.style.cssText=
        `left:${12+Math.random()*76}%;`+
        `font-size:${1+Math.random()*1.3}rem;`+
        `animation-duration:${d}s;`+
        `--r0:${(Math.random()-.5)*28}deg;`+
        `--r1:${(Math.random()-.5)*55}deg;`;
      hl.appendChild(e);
      setTimeout(()=>e.remove(),d*1000);
    },i*75);
  }
}

/* ambient */
function amb(){
  const pool=['💛','🌸','✨','💫','🌙','🫶'];
  const e=document.createElement('span');
  e.className='ambient';
  e.textContent=pool[Math.floor(Math.random()*pool.length)];
  const d=13+Math.random()*13;
  e.style.cssText=`left:${Math.random()*100}%;bottom:-50px;`+
    `font-size:${.9+Math.random()*1.1}rem;animation-duration:${d}s;`;
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),d*1000);
}
setInterval(amb,2600);amb();amb();

/* ── PWA: register service worker (safe no-op if file missing) ── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
